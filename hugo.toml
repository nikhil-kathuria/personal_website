baseURL = "https://nikhilkathuria.github.io/"
languageCode = "en"
DefaultContentLanguage = "en"
title = "Nikhil Kathuria"

theme = "anatole"

summarylength = 15
enableEmoji = true
enableRobotsTXT = true

pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
[[related.indices]]
  name = 'keywords'
  weight = 100
[[related.indices]]
  name = 'tags'
  weight = 80

[params]
  title = "I'm Nikhil Kathuria"
  author = "Nikhil Kathuria"
  description = "Software Engineer"
  profilePicture = "images/profile.jpg"
  keywords = "software engineer, personal website, blog"
  favicon = "favicons/"
  customCss = []
  customJs = []
  mainSections = ["post"]
  doNotLoadAnimations = false
  singleDateFormat = "Jan 2, 2006"
  indexDateFormat = "Jan 2, 2006"
  listDateFormat = "Jan 2, 2006"
  reversepagetitle = true

  [[params.socialIcons]]
  icon = "fa-brands fa-linkedin"
  title = "LinkedIn"
  url = "https://www.linkedin.com/in/nikhilkathuria/"

  [[params.socialIcons]]
  icon = "fa-brands fa-github"
  title = "GitHub"
  url = "https://github.com/nikhil-kathuria"
  
  [[params.socialIcons]]
  icon = "fa-brands fa-x"
  title = "GitHub"
  url = "https://x.com/nikhil_kathuria"




[menu]
  [[menu.main]]
  name = "Home"
  identifier = "home"
  weight = 100
  url = "/"

  [[menu.main]]
  name = "About"
  weight = 200
  identifier = "about"
  url = "/about/"

  [[menu.main]]
  name = "Blog"
  weight = 300
  identifier = "posts"
  url = "/post/"

  [[menu.main]]
  name = "Contact"
  weight = 400
  identifier = "contact"
  url = "/contact/"

[languages]
  [languages.en]
  title = "Nikhil Kathuria"
  weight = 1
  LanguageName = "EN"
  contentDir = "content/english"
